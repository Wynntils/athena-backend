name: 'Setup PHP Dependencies'
description: 'Setup PHP and install Composer dependencies with caching'

inputs:
  php-version:
    description: 'PHP version to use'
    required: false
    default: '8.5'
  install-dev:
    description: 'Install dev dependencies'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: pdo, pdo_pgsql, mbstring, xml, bcmath, zip, redis
        coverage: none

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      shell: bash
      env:
        COMPOSER_AUTH: ${{ env.COMPOSER_AUTH }}
      run: |
        if [ "${{ inputs.install-dev }}" == "true" ]; then
          composer install --prefer-dist --no-progress --no-interaction
        else
          composer install --prefer-dist --no-progress --no-interaction --no-dev
        fi
